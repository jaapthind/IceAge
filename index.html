<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ICE AGE: THE FINAL MASTERPIECE | OMEGA MONOLITH</title>
    
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & OMEGA THEME ENGINE
           ========================================================================== */
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;600;700&display=swap');

        :root {
            --bg-abyss: #030712;
            --bg-surface: #0b1120;
            
            /* Liquid Glass Tiers */
            --glass-base: rgba(15, 23, 42, 0.65);
            --glass-panel: rgba(30, 41, 59, 0.75);
            --glass-highlight: rgba(125, 211, 252, 0.15);
            --glass-border: rgba(56, 189, 248, 0.3);
            --glass-shadow-heavy: 0 25px 50px -12px rgba(0, 0, 0, 0.9);
            --glass-glow: 0 0 25px rgba(56, 189, 248, 0.15);
            
            /* Core Neons */
            --cyan-core: #00E5FF;
            --cyan-deep: #00838F;
            --pink-core: #D500F9;
            --gold-core: #FFD700;
            --gold-deep: #FF8F00;
            --red-core: #FF1744;
            --green-core: #00E676;
            
            /* Typography */
            --font-display: 'Orbitron', sans-serif;
            --font-ui: 'Rajdhani', sans-serif;
        }

        /* Reset & Strict Overflow Prevention */
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100vw; height: 100vh;
            background-color: var(--bg-abyss);
            color: #f8fafc; font-family: var(--font-ui);
            overflow: hidden; touch-action: none; /* ABSOLUTE NO SCROLLING */
        }

        /* ==========================================================================
           2. BACKGROUND CANVASES & AMBIENT EFFECTS
           ========================================================================== */
        #layer-ambient, #layer-particles, #layer-weather {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none;
        }
        #layer-ambient { z-index: -10; filter: blur(60px); opacity: 0.7; }
        #layer-particles { z-index: 9000; }
        #layer-weather { z-index: 8500; transition: opacity 2s ease; opacity: 0; }

        /* Weather CSS FX */
        .weather-blizzard {
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.8) 1px, transparent 1px),
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 2px, transparent 2px);
            background-size: 100px 100px, 40px 40px;
            animation: blizzardScroll 1.5s linear infinite;
        }
        .weather-storm {
            background: linear-gradient(180deg, rgba(15,23,42,0.8), rgba(0,0,0,0.2));
            animation: lightningStrike 6s infinite;
        }
        @keyframes blizzardScroll { 
            0% { background-position: 0 0, 0 0; } 
            100% { background-position: 100px 100px, 40px 200px; } 
        }
        @keyframes lightningStrike { 
            0%, 95%, 98%, 100% { opacity: 0.8; filter: brightness(1); } 
            96%, 99% { opacity: 1; filter: brightness(3) sepia(1) hue-rotate(180deg); } 
        }

        /* ==========================================================================
           3. LIQUID GLASS MIXINS & UTILITIES
           ========================================================================== */
        .glass-container {
            background: var(--glass-base);
            backdrop-filter: blur(24px) saturate(160%);
            -webkit-backdrop-filter: blur(24px) saturate(160%);
            border: 1px solid var(--glass-border);
            border-top: 1px solid var(--glass-highlight);
            box-shadow: var(--glass-shadow-heavy), var(--glass-glow);
            border-radius: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-panel {
            background: var(--glass-panel);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .glitch-text {
            position: relative; color: #fff;
            text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.025em -0.05em 0 rgba(0,255,0,0.75), 0.025em 0.05em 0 rgba(0,0,255,0.75);
            animation: glitch 500ms infinite;
        }
        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75), -0.025em 0.05em 0 rgba(0,0,255,0.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,0.75), -0.05em -0.025em 0 rgba(0,255,0,0.75), -0.025em 0.05em 0 rgba(0,0,255,0.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,0.75), 0.025em 0.025em 0 rgba(0,255,0,0.75), -0.05em -0.05em 0 rgba(0,0,255,0.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,0.75), 0.05em 0 0 rgba(0,255,0,0.75), 0 -0.05em 0 rgba(0,0,255,0.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,0.75), -0.025em -0.025em 0 rgba(0,255,0,0.75), -0.025em -0.05em 0 rgba(0,0,255,0.75); }
        }

        /* ==========================================================================
           4. STRICT FLEX-CLAMP LAYOUT ENGINE
           ========================================================================== */
        #engine-root {
            display: flex; width: 100%; height: 100%;
            padding: clamp(8px, 2vmin, 16px); gap: clamp(8px, 2vmin, 16px);
            position: relative; z-index: 10;
        }

        /* Mobile Adaptation - Stacks vertically but maintains zero scroll on body */
        @media (max-width: 1000px), (orientation: portrait) {
            #engine-root { flex-direction: column; }
            #ui-matrix { flex: 1 1 45% !important; max-width: 100% !important; height: auto !important; }
            #board-matrix { flex: 1 1 55% !important; }
        }

        /* The Zone containing the board */
        #board-matrix {
            flex: 1 1 auto; display: flex; align-items: center; justify-content: center;
            min-width: 0; min-height: 0; /* Critical for flex shrinking */
        }

        /* The magic container that forces the grid to never overflow */
        #board-clamp {
            width: 100%; height: 100%;
            max-width: 100%; max-height: 100%;
            display: flex; align-items: center; justify-content: center;
        }

        #procedural-grid {
            display: grid; 
            width: 100%; height: 100%;
            max-width: 100%; max-height: 100%;
            padding: clamp(4px, 1vmin, 12px); gap: clamp(2px, 0.5vmin, 6px);
            /* Aspect ratio is injected via JS depending on 36 or 50 size */
            aspect-ratio: var(--grid-ratio, 1/1); 
            background: rgba(0,0,0,0.6); border-radius: 16px;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.9), 0 0 20px rgba(0,229,255,0.1);
        }

        /* The Zone containing the UI */
        #ui-matrix {
            flex: 0 0 420px; max-width: 420px;
            display: flex; flex-direction: column; gap: clamp(8px, 1.5vmin, 16px);
            height: 100%; min-height: 0;
        }

        /* ==========================================================================
           5. BOARD SPACES & DYNAMIC CSS
           ========================================================================== */
        .grid-cell {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px; border: 2px solid rgba(0,0,0,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: clamp(0.5rem, 1.2vmin, 0.9rem); font-family: var(--font-display);
            font-weight: 900; color: #0f172a; text-align: center; text-transform: uppercase;
            position: relative; z-index: 10; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer; overflow: hidden; padding: 2px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .grid-cell:hover { transform: scale(1.15); z-index: 100; box-shadow: 0 10px 25px var(--glass-border); }

        .cell-start { background: linear-gradient(135deg, var(--gold-core), #fff) !important; color: #000; font-size: 1.1em; box-shadow: 0 0 15px var(--gold-core); }
        .cell-resource { background: #e0f2fe !important; color: #0369a1; }
        .cell-hazard { background: #fee2e2 !important; color: #b91c1c; }
        .cell-craft { background: linear-gradient(135deg, #f3e8ff, #d8b4fe) !important; color: #581c87; }
        .cell-vault { background: linear-gradient(135deg, var(--green-core), #bbf7d0) !important; color: #064e3b; }
        .cell-event { background: #ffedd5 !important; color: #c2410c; }

        /* Center Environment Core */
        #grid-core {
            grid-column: 2 / -2; grid-row: 2 / -2;
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
            border-radius: 12px; overflow: hidden; z-index: 1;
            box-shadow: inset 0 0 80px rgba(0,0,0,1);
            border: 2px solid rgba(255,255,255,0.05);
        }
        
        .core-sector { position: relative; }
        .sector-tundra { background: linear-gradient(135deg, #0f172a, #1e293b, #334155); }
        .sector-volcano { background: linear-gradient(135deg, #450a0a, #7f1d1d); overflow: hidden; }
        .sector-volcano::after { content:''; position:absolute; inset:-50%; background: radial-gradient(circle, rgba(239,68,68,0.3), transparent 60%); animation: pulseMagma 3s infinite alternate; }
        .sector-crystal { background: linear-gradient(45deg, #3b0764, #0891b2); }
        .sector-abyss { background: #020617; box-shadow: inset 0 0 40px rgba(213,0,249,0.2); }

        @keyframes pulseMagma { 0% { transform: scale(1); opacity: 0.4; } 100% { transform: scale(1.2); opacity: 1; } }

        /* Token System & Physics */
        .token-nest { position: absolute; bottom: 2px; left: 0; width: 100%; display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; pointer-events: none; }
        .game-token {
            width: clamp(14px, 2.5vmin, 32px); height: clamp(14px, 2.5vmin, 32px);
            border-radius: 50%; border: 2px solid #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(8px, 1.5vmin, 18px);
            box-shadow: 0 5px 10px rgba(0,0,0,0.8), inset 0 2px 5px rgba(255,255,255,0.6);
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .anim-hop { animation: trajectoryHop 0.25s ease-out; }
        @keyframes trajectoryHop { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-20px) scale(1.2); } }

        /* ==========================================================================
           6. HUD, INVENTORY & CONTROLS
           ========================================================================== */
        #hud-container { flex: 1 1 auto; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        
        .entity-card {
            padding: 12px; border-radius: 14px; background: rgba(0,0,0,0.5);
            border-left: 6px solid transparent; transition: all 0.3s ease;
            display: flex; flex-direction: column; gap: 8px; position: relative;
        }
        .entity-card.is-active { 
            background: linear-gradient(90deg, rgba(0,229,255,0.1), rgba(0,0,0,0.5)); 
            border-left-width: 12px; transform: translateX(6px); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }

        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .entity-name { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .entity-wealth { color: var(--gold-core); font-size: 1.4rem; font-weight: 900; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        
        .resource-bar { display: flex; gap: 8px; font-size: 0.85rem; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 8px; font-weight: 600; }
        .inv-grid { display: flex; flex-wrap: wrap; gap: 5px; min-height: 24px; }
        .item-pill { background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; border: 1px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 4px; }
        .item-pill:hover { background: var(--cyan-core); color: #000; border-color: #fff; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,229,255,0.4); }

        #command-center { flex: 0 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        .engine-btn {
            background: linear-gradient(180deg, var(--cyan-core), var(--cyan-deep));
            border: none; padding: 16px; font-family: var(--font-display); font-size: 1.4rem; font-weight: 900;
            border-radius: 12px; cursor: pointer; color: #000; text-transform: uppercase;
            box-shadow: 0 6px 0 #004D40, 0 10px 20px rgba(0,0,0,0.5); transition: 0.1s;
        }
        .engine-btn:active { transform: translateY(6px); box-shadow: 0 0px 0 #004D40, 0 5px 10px rgba(0,0,0,0.5); }
        .engine-btn:disabled { background: #1e293b; box-shadow: 0 6px 0 #0f172a; color: #475569; cursor: not-allowed; }

        .btn-danger { background: linear-gradient(180deg, var(--red-core), #b91c1c); box-shadow: 0 6px 0 #7f1d1d; color: #fff; }

        #terminal-output {
            height: 140px; background: rgba(0,0,0,0.8); border-radius: 10px;
            padding: 12px; font-family: monospace; font-size: 0.85rem;
            overflow-y: auto; display: flex; flex-direction: column; gap: 6px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        .term-line { color: #94a3b8; animation: slideInLeft 0.3s ease-out forwards; opacity: 0; transform: translateX(-10px); line-height: 1.4; }
        .term-line strong { color: var(--cyan-core); }
        .term-line.alert { color: var(--gold-core); }
        .term-line.danger { color: var(--red-core); }
        .term-line.sys { color: var(--green-core); font-style: italic; }
        @keyframes slideInLeft { to { opacity: 1; transform: translateX(0); } }

        /* ==========================================================================
           7. MODALS, CRAFTING & OVERLAYS
           ========================================================================== */
        .overlay-mask { position: fixed; inset: 0; background: rgba(3,7,18,0.9); backdrop-filter: blur(12px); display: none; align-items: center; justify-content: center; z-index: 10000; padding: 15px; }
        .modal-box { width: 100%; max-width: 650px; max-height: 95vh; overflow-y: auto; padding: 35px; text-align: center; position: relative; }
        
        .config-row { background: rgba(0,0,0,0.5); padding: 12px; border-radius: 10px; display: flex; gap: 12px; margin-bottom: 12px; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .config-row select, .config-row input { flex: 1; background: #020617; border: 1px solid var(--cyan-core); color: #fff; padding: 12px; border-radius: 8px; font-family: var(--font-ui); font-size: 1.1rem; font-weight: bold; }
        
        /* Synthesis Grid */
        .synth-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .synth-card { background: rgba(0,0,0,0.6); padding: 20px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; gap: 10px; transition: 0.2s; }
        .synth-card:hover { border-color: var(--cyan-core); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,229,255,0.15); }
        .recipe-cost { display: flex; justify-content: center; gap: 10px; background: rgba(0,0,0,0.5); padding: 8px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; }
        
        /* Dice & Combat */
        .dice-container { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .dice-cube { width: 140px; height: 140px; background: #f8fafc; border-radius: 24px; display: flex; align-items: center; justify-content: center; font-size: 80px; color: #0f172a; box-shadow: 0 15px 35px rgba(0,0,0,0.9), inset 0 -10px 20px rgba(0,0,0,0.2); border: 4px solid #cbd5e1; }
        .anim-rumble { animation: rumbleShake 0.2s infinite; }
        @keyframes rumbleShake { 0% { transform: translate(3px, 3px) rotate(0deg); } 25% { transform: translate(-3px, -2px) rotate(-5deg); } 50% { transform: translate(0px, 4px) rotate(5deg); } 75% { transform: translate(3px, -2px) rotate(-2deg); } 100% { transform: translate(-2px, 3px) rotate(2deg); } }

        .combat-arena { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 16px; margin: 20px 0; }
        .combat-avatar { font-size: 4rem; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        
        /* Dynamic Float Text */
        .float-fx { position: absolute; font-family: var(--font-display); font-weight: 900; font-size: 2.5rem; pointer-events: none; z-index: 9500; animation: floatUpFade 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-shadow: 0 4px 15px rgba(0,0,0,0.9), 0 0 5px rgba(255,255,255,0.3); }
        @keyframes floatUpFade { 0% { opacity: 0; transform: translateY(20px) scale(0.5); } 20% { opacity: 1; transform: translateY(0) scale(1.2); } 100% { opacity: 0; transform: translateY(-80px) scale(1); } }

    </style>
</head>
<body>

    <canvas id="layer-ambient"></canvas>
    <canvas id="layer-particles"></canvas>
    <div id="layer-weather"></div>

    <div id="modal-config" class="overlay-mask" style="display: flex;">
        <div class="modal-box glass-container">
            <h1 class="glitch-text" style="font-family: var(--font-display); font-size: 3rem; margin-bottom: 5px;">OMEGA ENGINE</h1>
            <p style="color: var(--cyan-core); font-weight: bold; letter-spacing: 3px; margin-bottom: 25px;">STRICT CLAMP ARCHITECTURE</p>
            
            <div id="config-error" style="color:var(--red-core); font-weight:bold; margin-bottom:15px; display:none; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 8px;"></div>

            <div class="config-row">
                <span style="width: 140px; text-align: left; font-family: var(--font-display); font-weight: 900;">MAP SIZE:</span>
                <select id="cfg-grid-size">
                    <option value="36">Classic Grid (36 Cells)</option>
                    <option value="50" selected>Extended Grid (50 Cells)</option>
                </select>
            </div>
            
            <div class="config-row">
                <span style="width: 140px; text-align: left; font-family: var(--font-display); font-weight: 900;">ENTITIES:</span>
                <select id="cfg-entity-count">
                    <option value="2">2 Players</option>
                    <option value="3">3 Players</option>
                    <option value="4" selected>4 Players</option>
                </select>
            </div>

            <div id="entity-input-zone" style="margin-top: 20px;"></div>

            <button class="engine-btn" style="width: 100%; margin-top: 25px; background: linear-gradient(180deg, var(--gold-core), var(--gold-deep)); box-shadow: 0 6px 0 #b45309;" onclick="Omega.initialize()">IGNITE ENGINE</button>
        </div>
    </div>

    <main id="engine-root" style="display: none;">
        
        <section id="board-matrix">
            <div id="board-clamp">
                <div id="procedural-grid" class="glass-container">
                    <div id="grid-core">
                        <div class="core-sector sector-tundra"></div>
                        <div class="core-sector sector-volcano"></div>
                        <div class="core-sector sector-crystal"></div>
                        <div class="core-sector sector-abyss"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="ui-matrix">
            <div id="hud-container" class="glass-container">
                </div>

            <div id="command-center" class="glass-container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <div style="font-size: 0.8rem; color: #94a3b8; font-weight:bold; letter-spacing: 1px;">ACTIVE ENTITY</div>
                        <h2 id="ui-active-name" style="font-family: var(--font-display); font-size: 1.8rem; margin:0; line-height: 1;">PLAYER</h2>
                    </div>
                    <div style="text-align: right;">
                        <div style="font-size: 0.8rem; color: #94a3b8; font-weight:bold; letter-spacing: 1px;">VAULT 🌰</div>
                        <h2 id="ui-vault-val" style="color: var(--green-core); font-size: 1.8rem; margin:0; font-family: var(--font-display); line-height: 1;">0</h2>
                    </div>
                </div>

                <div style="display: flex; justify-content: space-between; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; font-family: var(--font-display); border: 1px solid rgba(255,255,255,0.05);">
                    <span>CYCLE: <b id="ui-cycle-val" style="color:var(--cyan-core)">1</b></span>
                    <span>ENV: <b id="ui-env-val" style="color:var(--gold-core)">STABLE</b></span>
                </div>

                <button id="btn-trigger-roll" class="engine-btn" onclick="Omega.triggerRoll()">EXECUTE ROLL 🎲</button>
                
                <div id="terminal-output"></div>
            </div>
        </section>
    </main>

    <div id="modal-dice" class="overlay-mask">
        <div class="dice-container">
            <h2 id="dice-header" style="font-family: var(--font-display); color: var(--cyan-core); font-size: 2.5rem; text-shadow: 0 0 20px rgba(0,229,255,0.4);"></h2>
            <div class="dice-cube anim-rumble" id="dice-mesh">🎲</div>
            <h3 id="dice-modifiers" style="color: var(--gold-core); font-size: 1.2rem; height: 30px; margin-top: 10px;"></h3>
        </div>
    </div>

    <div id="modal-alert" class="overlay-mask">
        <div class="modal-box glass-container" style="max-width: 500px;">
            <h2 id="alert-title" style="font-family: var(--font-display); font-size: 2.5rem; margin-bottom: 15px;"></h2>
            <p id="alert-message" style="font-size: 1.2rem; margin-bottom: 25px; line-height: 1.5; color: #cbd5e1;"></p>
            <div id="alert-buttons"></div>
        </div>
    </div>

    <div id="modal-synth" class="overlay-mask">
        <div class="modal-box glass-container" style="max-width: 800px;">
            <h2 style="font-family: var(--font-display); color: var(--pink-core); font-size: 2.5rem;">SYNTHESIS MATRIX</h2>
            <div id="synth-wallet" style="margin: 15px 0; font-size: 1.2rem; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);"></div>
            
            <div class="synth-matrix" id="synth-schematics"></div>

<script>
/**

// ============================================================================
// 1. HARDWARE SUBSYSTEMS (Audio & Particles)
// ============================================================================
class WebAudioSynth {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.master = this.ctx.createGain();
        this.master.gain.value = 0.15; // Global Mix
        this.master.connect(this.ctx.destination);
    }
    _play(freq, type, dur, vol = 1) {
        if (this.ctx.state === 'suspended') return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + dur);
        osc.connect(gain); gain.connect(this.master);
        osc.start(); osc.stop(this.ctx.currentTime + dur);
    }
    sfxHop() { this._play(450, 'sine', 0.1, 0.5); setTimeout(() => this._play(650, 'sine', 0.15, 0.4), 80); }
    sfxCoin() { this._play(1200, 'square', 0.1, 0.3); setTimeout(() => this._play(1800, 'square', 0.2, 0.3), 100); }
    sfxImpact() { this._play(100, 'sawtooth', 0.4, 1.0); }
    sfxSynth() { this._play(800, 'triangle', 0.15, 0.6); setTimeout(() => this._play(1200, 'triangle', 0.3, 0.6), 120); }
    sfxError() { this._play(150, 'square', 0.3, 0.8); }
    unlock() { if (this.ctx.state === 'suspended') this.ctx.resume(); }
}
const AudioSYS = new WebAudioSynth();

class ParticlePhysics {
    constructor() {
        this.canvas = document.getElementById('layer-particles');
        this.ctx = this.canvas.getContext('2d');
        this.pool = [];
        this.wind = 0; // Affected by weather
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this._loop();
    }
    resize() { this.canvas.width = window.innerWidth; this.canvas.height = window.innerHeight; }
    setWind(w) { this.wind = w; }
    burst(x, y, color, count, type = 'fountain') {
        for (let i = 0; i < count; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = type === 'fountain' ? Math.random() * 8 + 3 : Math.random() * 4 + 1;
            this.pool.push({
                x: x, y: y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed - (type==='fountain'?4:0),
                life: 1.0, decay: Math.random() * 0.03 + 0.015,
                color: color, size: Math.random() * 6 + 2, gravity: 0.2
            });
        }
    }
    burstAt(domId, color, count) {
        const el = document.getElementById(domId); if(!el) return;
        const r = el.getBoundingClientRect();
        this.burst(r.left + r.width/2, r.top + r.height/2, color, count);
    }
    _loop() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        for (let i = this.pool.length - 1; i >= 0; i--) {
            let p = this.pool[i];
            p.vy += p.gravity;
            p.vx += this.wind; // Apply weather wind
            p.x += p.vx; p.y += p.vy;
            p.life -= p.decay;
            if (p.life <= 0) { this.pool.splice(i, 1); } 
            else {
                this.ctx.globalAlpha = p.life; this.ctx.fillStyle = p.color;
                this.ctx.beginPath(); this.ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); this.ctx.fill();
            }
        }
        this.ctx.globalAlpha = 1.0;
        requestAnimationFrame(() => this._loop());
    }
}
const ParticleSYS = new ParticlePhysics();

// Ambient Canvas Loop
(function initAmbient() {
    const c = document.getElementById('layer-ambient'), ctx = c.getContext('2d');
    function render() {
        c.width = window.innerWidth; c.height = window.innerHeight;
        let t = Date.now() * 0.0003;
        ctx.clearRect(0, 0, c.width, c.height);
        const grad = (x, y, r, color) => {
            let g = ctx.createRadialGradient(x,y,0,x,y,r);
            g.addColorStop(0, color); g.addColorStop(1, 'transparent');
            ctx.fillStyle = g; ctx.fillRect(0,0,c.width,c.height);
        };
        grad(c.width/2 + Math.sin(t)*300, c.height/2 + Math.cos(t)*200, 500, 'rgba(0, 229, 255, 0.08)');
        grad(c.width/2 - Math.cos(t*1.2)*400, c.height/2 - Math.sin(t*1.2)*300, 600, 'rgba(213, 0, 249, 0.05)');
        requestAnimationFrame(render);
    }
    render();
})();

class Entity {
    constructor(id, name, color, icon) {
        this.id = id; this.name = name; this.color = color; this.icon = icon;
        this.pos = 0; this.laps = 0; this.acorns = 5;
        this.res = { wood: 0, ice: 0, crystal: 0 };
        this.inv = [];
        this.status = { skip: false, shield: false, crampons: false };
        this.achievements = { duelsWon: 0, itemsCrafted: 0 };
    }
    modifyWealth(amt) {
        let actual = amt < 0 ? Math.min(this.acorns, Math.abs(amt)) : amt;
        this.acorns += amt < 0 ? -actual : actual;
        Overlay.floatText(`nest-${this.pos}`, amt < 0 ? `-${actual}` : `+${actual}`, amt < 0 ? 'var(--red-core)' : 'var(--green-core)');
        return actual; // Return amount lost for jackpot
    }
    modifyResource(type, amt) {
        this.res[type] += amt;
        Overlay.log(`<strong>${this.name}</strong> harvested ${amt} ${type.toUpperCase()}`);
    }
}

// ============================================================================
// 4. OMEGA CORE CONTROLLER
// ============================================================================
const Omega = {
    entities: [], gridConfig: [], 
    width: 0, height: 0, size: 36,
    state: { turnIdx: 0, cycle: 1, vault: 0, isAnim: false, env: DB.environments[0] },

    initialize() {
        AudioSYS.unlock();
        const err = document.getElementById('config-error'); err.style.display = 'none';
        
        this.size = parseInt(document.getElementById('cfg-grid-size').value); // 36 or 50
        
        // Strict Perimeter Math Calculation
        // Formula: P = 2W + 2H - 4. 
        // For 36: W=10, H=10. For 50: W=14, H=13.
        let halfP = (this.size + 4) / 2;
        this.width = Math.ceil(halfP / 2);
        this.height = Math.floor(halfP / 2);

        let eCount = parseInt(document.getElementById('cfg-entity-count').value);
        this.entities = [];
        for(let i=0; i<eCount; i++) {
            let n = document.getElementById(`p${i}-name`).value.trim() || `Entity-${i+1}`;
            if(DB.profanity.test(n)) { err.innerText = "CRITICAL: Profanity filter triggered."; err.style.display = 'block'; AudioSYS.sfxError(); return; }
            this.entities.push(new Entity(i, n, DB.colors[i], document.getElementById(`p${i}-icon`).value));
        }

        Overlay.close('modal-config');
        document.getElementById('engine-root').style.display = 'flex';
        
        GridBuilder.construct(this.width, this.height, this.size);
        Interface.renderFull();
        Overlay.log("=== OMEGA ENGINE ONLINE ===", "sys");
        this.beginTurn();
    },

    beginTurn() {
        let e = this.entities[this.state.turnIdx];
        Interface.updateHeader(e);
        Interface.renderFull();

        if (e.status.skip) {
            Overlay.log(`<strong>${e.name}</strong> is frozen and must skip this cycle.`, "danger");
            e.status.skip = false;
            setTimeout(() => this.finalizeTurn(), 1200);
            return;
        }
        document.getElementById('btn-trigger-roll').disabled = false;
    },

    triggerRoll() {
        if(this.state.isAnim) return; this.state.isAnim = true;
        document.getElementById('btn-trigger-roll').disabled = true;
        
        let e = this.entities[this.state.turnIdx];
        let baseRoll = Math.floor(Math.random() * 6) + 1;
        let finalRoll = baseRoll;
        let modText = "";

        // Weather modifiers
        if (this.state.env.id === 'BLIZZARD' && !e.status.crampons) { finalRoll = Math.max(1, baseRoll - 1); modText = "[BLIZZARD: -1]"; }
        if (this.state.env.id === 'TAILWIND') { finalRoll += 1; modText = "[TAILWIND: +1]"; }

        Overlay.diceCinematic(e, finalRoll, modText, () => {
            Overlay.log(`<strong>${e.name}</strong> generated a movement vector of ${finalRoll}.`);
            this.executeMovement(e, finalRoll, true);
        });
    },

    executeMovement(e, steps, evaluate) {
        if (steps === 0) {
            this.state.isAnim = false;
            let el = document.getElementById(`tok-${e.id}`); if(el) el.classList.remove('anim-hop');
            if(evaluate) this.evaluateSector(e);
            return;
        }

        let dir = steps > 0 ? 1 : -1;
        e.pos += dir;

        // Orbital Lap Logic
        if (e.pos >= this.size) {
            e.pos = 0; e.laps++;
            if(e.laps > 0) {
                e.modifyWealth(5);
                Overlay.log(`<strong>${e.name}</strong> completed an orbit! +5 🌰`, 'alert');
                AudioSYS.sfxCoin();
                ParticleSYS.burstAt('grid-core', varColor('--gold-core'), 40);
                if (e.laps >= 3) { this.triggerVictory(e); return; }
            }
        } else if (e.pos < 0) { e.pos = this.size - 1; e.laps--; }

        GridBuilder.placeToken(e, true);
        AudioSYS.sfxHop();
        
        setTimeout(() => this.executeMovement(e, steps > 0 ? steps - 1 : steps + 1, evaluate), 200);
    },

    evaluateSector(e) {
        // Combat / Collision Check (Exclude Start Space 0)
        let target = this.entities.find(o => o.id !== e.id && o.pos === e.pos && e.pos !== 0);
        if (target) {
            Overlay.log(`COLLISION: <strong>${e.name}</strong> intercepted <strong>${target.name}</strong>!`, 'danger');
            this.executeCombat(e, target, () => this.processSectorLogic(e));
            return;
        }
        this.processSectorLogic(e);
    },

    executeCombat(attacker, defender, cb) {
        // Simplified RNG combat for speed, winner steals 2
        let aRoll = Math.random(); let dRoll = Math.random();
        let win = aRoll > dRoll ? attacker : defender;
        let lose = aRoll > dRoll ? defender : attacker;

        Overlay.alert("COMBAT PROTOCOL", `${win.name} overpowered ${lose.name} in sector ${attacker.pos}!`, () => {
            if(lose.status.shield) {
                Overlay.log(`<strong>${lose.name}'s</strong> Aegis Shield absorbed the critical hit!`);
                lose.status.shield = false; ParticleSYS.burstAt(`tok-${lose.id}`, varColor('--cyan-core'), 20);
            } else {
                let stolen = lose.modifyWealth(-2);
                win.modifyWealth(stolen); AudioSYS.sfxImpact();
                win.achievements.duelsWon++;
            }
            cb();
        });
    },

    processSectorLogic(e) {
        let sector = this.gridConfig[e.pos];
        Overlay.log(`<strong>${e.name}</strong> anchored at [${sector.name}]`);

        // Hazard Shield Check
        if(sector.type === 'hazard' && e.status.shield) {
            Overlay.log(`Hazard neutralized by Aegis Shield.`, 'sys');
            e.status.shield = false; ParticleSYS.burstAt(`tok-${e.id}`, varColor('--cyan-core'), 20);
            this.finalizeTurn(); return;
        }

        // Environment multiplier
        let dmgMult = this.state.env.id === 'STORM' ? 2 : 1;

        switch(sector.action) {
            case 'start': this.finalizeTurn(); break;
            case 'wood': e.modifyResource('wood', 1); AudioSYS.sfxCoin(); this.finalizeTurn(); break;
            case 'ice': e.modifyResource('ice', 1); AudioSYS.sfxCoin(); this.finalizeTurn(); break;
            case 'crystal': e.modifyResource('crystal', 1); AudioSYS.sfxCoin(); this.finalizeTurn(); break;
            case 'acorns_2': e.modifyWealth(2); AudioSYS.sfxCoin(); this.finalizeTurn(); break;
            case 'craft': Overlay.openSynth(e); break;
            case 'trap_freeze': 
                e.status.skip = true; AudioSYS.sfxImpact();
                Overlay.alert("TRAP DETECTED", "You are frozen. Lose your next cycle.", () => this.finalizeTurn()); break;
            case 'trap_back':
                let back = 3 * dmgMult; AudioSYS.sfxImpact();
                Overlay.alert("GUST TRAP", `Blown backwards ${back} units!`, () => { this.state.isAnim = true; this.executeMovement(e, -back, true); }); break;
            case 'vault':
                if(this.state.vault > 0) {
                    let v = this.state.vault; this.state.vault = 0;
                    e.modifyWealth(v); AudioSYS.sfxCoin(); ParticleSYS.burstAt(`nest-${e.pos}`, varColor('--green-core'), 50);
                    Overlay.alert("VAULT BREACHED", `Secured ${v} 🌰 from the central vault!`, () => this.finalizeTurn());
                } else { Overlay.log("Vault is empty."); this.finalizeTurn(); }
                break;
            case 'event': this.triggerRandomEvent(e); break;
            default: this.finalizeTurn();
        }
    },

    triggerRandomEvent(e) {
        let evs = [
            { t: "BOUNTY", d: "Found hidden fragments. +3 🌰", f: () => { e.modifyWealth(3); this.finalizeTurn(); } },
            { t: "TAX", d: "System tax. Drop 2 🌰 into the vault.", f: () => { let l = e.modifyWealth(-2); this.state.vault += l; this.finalizeTurn(); } },
            { t: "WARP", d: "Wormhole opens! Advance 4 spaces.", f: () => { this.state.isAnim = true; this.executeMovement(e, 4, true); } }
        ];
        let rnd = evs[Math.floor(Math.random()*evs.length)];
        Overlay.alert(`EVENT: ${rnd.t}`, rnd.d, rnd.f);
    },

    synthesize(e, itemKey) {
        let req = DB.schematics[itemKey].req;
        for(let r in req) if(e.res[r] < req[r]) return false;
        for(let r in req) e.res[r] -= req[r];
        e.inv.push(itemKey); e.achievements.itemsCrafted++;
        AudioSYS.sfxSynth(); Overlay.log(`<strong>${e.name}</strong> synthesized [${DB.schematics[itemKey].name}].`, 'sys');
        Interface.renderFull(); Overlay.openSynth(e); // refresh
    },

    deployItem(eId, itemKey) {
        if(this.state.isAnim) return;
        let e = this.entities.find(x => x.id === eId);
        if(!e || this.state.turnIdx !== e.id) return; // Must be active turn

        let idx = e.inv.indexOf(itemKey);
        if(idx > -1) {
            e.inv.splice(idx, 1);
            let item = DB.schematics[itemKey];
            Overlay.log(`<strong>${e.name}</strong> deployed ${item.icon} ${item.name}!`, 'alert');
            AudioSYS.sfxSynth();

            switch(itemKey) {
                case 'warp_drive': this.state.isAnim = true; this.executeMovement(e, 7, true); break;
                case 'aegis': e.status.shield = true; GridBuilder.placeToken(e); break;
                case 'crampons': e.status.crampons = true; break;
                case 'siphon': 
                    this.entities.forEach(t => {
                        if(t.id !== e.id && !t.status.shield) {
                            if(t.res.crystal > 0) { t.res.crystal--; e.res.crystal++; }
                            if(t.acorns > 0) { t.modifyWealth(-1); e.modifyWealth(1); }
                        } else if(t.status.shield) { Overlay.log(`${t.name}'s shield blocked siphon!`); t.status.shield = false; }
                    }); break;
            }
            Interface.renderFull();
        }
    },

    finalizeTurn() {
        let e = this.entities[this.state.turnIdx];
        e.status.crampons = false; // Reset temp buffs

        this.state.turnIdx++;
        if(this.state.turnIdx >= this.entities.length) {
            this.state.turnIdx = 0; this.state.cycle++;
            
            // Environment Shift logic (30% chance)
            if(Math.random() > 0.7) {
                this.state.env = DB.environments[Math.floor(Math.random() * DB.environments.length)];
                Overlay.log(`ENV SHIFT: ${this.state.env.log}`, 'alert');
                AudioSYS.sfxImpact();
                
                // Update Weather CSS Layer & Particle Physics
                let wl = document.getElementById('layer-weather');
                wl.className = this.state.env.css;
                wl.style.opacity = this.state.env.css ? '1' : '0';
                ParticleSYS.setWind(this.state.env.wind);
            }
        }
        this.beginTurn();
    },

    triggerVictory(e) {
        document.getElementById('engine-root').style.filter = 'blur(15px)';
        Overlay.alert("MISSION ACCOMPLISHED", `<strong>${e.name.toUpperCase()}</strong> has secured 3 orbital laps!`, () => location.reload());
        for(let i=0; i<15; i++) setTimeout(() => ParticleSYS.burst(window.innerWidth/2, window.innerHeight/2, e.color, 40), i*150);
    }
};

// ============================================================================
// 5. GRID BUILDER (Strict Flex-Clamp Integration)
// ============================================================================
const GridBuilder = {
    construct(w, h, size) {
        const grid = document.getElementById('procedural-grid');
        grid.style.gridTemplateColumns = `repeat(${w}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${h}, 1fr)`;
        
        // This CSS variable forces the grid to remain a perfect aspect ratio
        // allowing Flexbox to clamp it perfectly without overflow.
        grid.style.setProperty('--grid-ratio', `${w}/${h}`);
        
        Array.from(grid.children).forEach(c => { if(c.id !== 'grid-core') c.remove(); });

        let coords = [];
        for(let c=1; c<=w; c++) coords.push({c,r:1});
        for(let r=2; r<=h; r++) coords.push({c:w,r});
        for(let c=w-1; c>=1; c--) coords.push({c,r:h});
        for(let r=h-1; r>=2; r--) coords.push({c:1,r});

        const getSpace = () => {
            let r = Math.random() * 100, s = 0;
            for(let bp of DB.blueprints) { s += bp.w; if(r <= s) return bp; }
            return DB.blueprints[0];
        };

        coords.forEach((cd, i) => {
            let d = (i === 0) ? {name:'START', action:'start', css:'cell-start'} : getSpace();
            Omega.gridConfig[i] = d;

            let el = document.createElement('div');
            el.className = `grid-cell ${d.css}`;
            el.style.gridColumn = cd.c; el.style.gridRow = cd.r;
            el.innerHTML = `<span>${d.name}</span><div class="token-nest" id="nest-${i}"></div>`;
            grid.appendChild(el);
        });

        Omega.entities.forEach(e => this.placeToken(e));
    },

    placeToken(e, hop = false) {
        let old = document.getElementById(`tok-${e.id}`); if(old) old.remove();
        let tok = document.createElement('div');
        tok.id = `tok-${e.id}`; tok.className = `game-token ${hop ? 'anim-hop' : ''}`;
        tok.style.background = `linear-gradient(135deg, ${e.color}, #000)`;
        tok.innerText = e.icon;
        
        if(e.status.shield) tok.style.boxShadow = `0 0 15px var(--cyan-core), inset 0 0 10px #fff`;
        
        document.getElementById(`nest-${e.pos}`).appendChild(tok);
    }
};

                        <span style="color:#cbd5e1">🪵 ${e.res.wood}</span> | 
                        <span style="color:var(--cyan-core)">🧊 ${e.res.ice}</span> | 
                        <span style="color:var(--pink-core)">💎 ${e.res.crystal}</span>
                    </div>
                    <div style="font-size:0.8rem; color:#94a3b8; display:flex; justify-content:space-between;">
                        <span>Orbit: ${e.laps}/3</span>
                        ${e.status.shield ? '<span style="color:var(--cyan-core)">🛡️ SHIELDED</span>' : ''}
                        ${e.status.skip ? '<span style="color:var(--red-core)">❄️ FROZEN</span>' : ''}
                    </div>
                    <div class="inv-grid">${invHTML}</div>
                </div>`;
        });

        document.getElementById('ui-vault-val').innerText = Omega.state.vault;
        document.getElementById('ui-cycle-val').innerText = Omega.state.cycle;
        document.getElementById('ui-env-val').innerText = Omega.state.env.id;
    },

    updateHeader(e) {
        let h = document.getElementById('ui-active-name');
        h.innerText = e.name; h.style.color = e.color;
    }
};

const Overlay = {
    log(str, type = '') {
        const t = document.getElementById('terminal-output');
        let d = new Date(), ts = `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
        t.innerHTML = `<div class="term-line ${type}">[${ts}] > ${str}</div>` + t.innerHTML;
    },

    floatText(id, txt, color) {
        let el = document.getElementById(id); if(!el) return;
        let r = el.getBoundingClientRect(), f = document.createElement('div');
        f.className = 'float-fx'; f.innerText = txt; f.style.color = color;
        f.style.left = (r.left + r.width/2 - 20) + 'px'; f.style.top = r.top + 'px';
        document.body.appendChild(f); setTimeout(() => f.remove(), 1200);
    },

    diceCinematic(e, res, modTxt, cb) {
        let m = document.getElementById('modal-dice'); m.style.display = 'flex';
        document.getElementById('dice-header').innerText = `${e.name} GENERATING...`;
        let cube = document.getElementById('dice-mesh');
        cube.className = 'dice-cube anim-rumble'; cube.innerText = '🎲';
        document.getElementById('dice-modifiers').innerText = '';

        setTimeout(() => {
            AudioSYS.sfxImpact();
            cube.className = 'dice-cube'; cube.innerText = res;
            document.getElementById('dice-modifiers').innerText = modTxt;
            setTimeout(() => { m.style.display = 'none'; cb(); }, 900);
        }, 1200);
    },

    alert(title, msg, cb) {
        document.getElementById('modal-alert').style.display = 'flex';
        document.getElementById('alert-title').innerText = title;
        document.getElementById('alert-message').innerHTML = msg;
        let btn = document.getElementById('alert-buttons');
        btn.innerHTML = `<button class="engine-btn" style="width:100%">ACKNOWLEDGE</button>`;
        btn.querySelector('button').onclick = () => { this.close('modal-alert'); if(cb) cb(); };
    },

    openSynth(e) {
        document.getElementById('modal-synth').style.display = 'flex';
        document.getElementById('synth-wallet').innerHTML = `
            AVAILABLE: <span style="color:#cbd5e1">🪵 ${e.res.wood}</span> | 
            <span style="color:var(--cyan-core)">🧊 ${e.res.ice}</span> | 
            <span style="color:var(--pink-core)">💎 ${e.res.crystal}</span>
        `;
        let grid = document.getElementById('synth-schematics'); grid.innerHTML = '';
        
        for(let key in DB.schematics) {
            let r = DB.schematics[key], canCraft = true, reqStr = [];
            for(let q in r.req) {
                if(e.res[q] < r.req[q]) canCraft = false;
                let ico = q==='wood'?'🪵':q==='ice'?'🧊':'💎'; reqStr.push(`${ico} ${r.req[q]}`);
            }
            grid.innerHTML += `
                <div class="synth-card" style="opacity:${canCraft?1:0.4}">
                    <div style="font-size:3rem;text-align:center;">${r.icon}</div>
                    <h3 style="color:var(--cyan-core);text-align:center;margin:5px 0;">${r.name}</h3>
                    <p style="font-size:0.85rem;color:#94a3b8;text-align:center;flex:1;">${r.desc}</p>
                    <div class="recipe-cost">${reqStr.join(' + ')}</div>
                    <button class="engine-btn" style="padding:10px;font-size:1rem;margin-top:10px;" 
                        ${canCraft?'':'disabled'} onclick="Omega.synthesize(Omega.entities[Omega.state.turnIdx], '${key}')">SYNTHESIZE</button>
                </div>`;
        }
    },

    close(id) { document.getElementById(id).style.display = 'none'; }
};

// Utils
function varColor(name) { return getComputedStyle(document.documentElement).getPropertyValue(name).trim(); }

// Initialize Setup UI on load
Interface.setupInit();

</script>
</body>
</html>
